/* Estilos Globales Alpha */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#252525;
  --rosa:#d4537e;--rosa2:#e8729a;--rosa-d:#8c2f50;--rosa-xl:rgba(212,83,126,.12);
  --cyan:#00d4ff;--blanco:#f0ece4;--muted:#777;
  --border2:rgba(255,255,255,.13);--r:12px;--r2:8px;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--blanco);overflow-x:hidden;padding-bottom:70px}

/* Contenedor del Escáner Corregido */
#cam-container {
    width: 100%; max-width: 400px; margin: 20px auto;
    position: relative; border-radius: 20px; overflow: hidden;
    aspect-ratio: 1/1; background: #000; border: 2px solid var(--rosa);
}
#cam-preview { width: 100%; height: 100%; object-fit: cover; }
.scan-line {
    position: absolute; top: 0; left: 0; width: 100%; height: 2px;
    background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
    animation: scan 2s linear infinite;
}
@keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

/* Formularios y Botones */
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:1rem;margin-bottom:.75rem}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:15px}
.field label{font-size:11px;color:var(--muted);font-weight:500}
