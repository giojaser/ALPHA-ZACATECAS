<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
  background: #007bff;
  color: white;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

li {
  background: #eee;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
<h1>Control de Visitas</h1>
</header>

<div class="container">

<div class="card">
<h2>📷 Escanear QR</h2>
<button onclick="iniciarQR()">Activar cámara</button>
<div id="reader"></div>
<p id="resultadoQR"></p>
</div>

<div class="card">
<h2>➕ Agregar Visita Manual</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar</button>
</div>

<div class="card">
<h2>📋 Lista de Visitas</h2>
<ul id="listaVisitas"></ul>
</div>

</div>

<script>
// =======================
// FOLIO
// =======================
function generarFolio() {
  return 'VIS-' + Date.now();
}

// =======================
// QR
// =======================
let qrActivo = false;
let qr;

function iniciarQR() {

  if (qrActivo) return;

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (qrCodeMessage) => {

      document.getElementById("resultadoQR").innerText =
        "QR detectado: " + qrCodeMessage;

      guardarVisita(qrCodeMessage);
    }
  ).then(() => {
    qrActivo = true;
  })
  .catch(err => {
    document.getElementById("resultadoQR").innerText =
      "⚠️ Usa celular o habilita cámara";
  });
}

// =======================
// GUARDAR VISITA
// =======================
function guardarVisita(nombre) {

  const visita = {
    folio: generarFolio(),
    nombre: nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.push(visita);

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrarVisitas();
}

// =======================
// MANUAL
// =======================
function agregarVisita() {

  const nombre = document.getElementById("nombreVisita").value.trim();

  if (!nombre) {
    alert("Ingresa un nombre");
    return;
  }

  guardarVisita(nombre);

  document.getElementById("nombreVisita").value = "";
}

// =======================
// MOSTRAR
// =======================
function mostrarVisitas() {

  const lista = document.getElementById("listaVisitas");

  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.slice().reverse().forEach(v => {

    const li = document.createElement("li");

    li.textContent = `${v.folio} - ${v.nombre} (${v.fecha})`;

    lista.appendChild(li);
  });
}

// =======================
mostrarVisitas();
</script>

</body>
</html>
