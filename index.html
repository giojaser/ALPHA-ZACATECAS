<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alpha — Centro de Desarrollo Artístico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<style>
/* --- ESTILOS ALPHA --- */
:root {
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e;
  --rosa:#d4537e; --cyan:#00d4ff; --blanco:#f0ece4; --muted:#777;
  --border:rgba(255,255,255,0.1); --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--blanco); padding-bottom:80px; }

.topbar { background:var(--bg2); padding:15px; border-bottom:1px solid var(--border); text-align:center; position:sticky; top:0; z-index:100; }
.topbar h1 { font-family:'Bebas Neue'; color:var(--rosa); letter-spacing:2px; font-size:26px; }

.bot-nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg2); display:flex; border-top:1px solid var(--border); z-index:100; }
.bn { flex:1; padding:15px; border:none; background:transparent; color:var(--muted); font-size:10px; cursor:pointer; font-weight:600; }
.bn.on { color:var(--rosa); }

.page { display:none; padding:20px; max-width:500px; margin:0 auto; }
.page.on { display:block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.card { background:var(--bg2); padding:15px; border-radius:var(--r); border:1px solid var(--border); margin-bottom:15px; position:relative; }
input, select { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:white; font-size:14px; }
.btn { width:100%; padding:14px; border:none; border-radius:10px; font-weight:700; cursor:pointer; background:var(--rosa); color:white; }
.btn-del { background:#ff4444; margin-top:10px; padding:8px; font-size:11px; border-radius:5px; border:none; color:white; width:100%; }

/* Contenedor de Cámara */
#cam-wrap { width:100%; aspect-ratio:1/1; background:#000; border-radius:20px; overflow:hidden; position:relative; border:2px solid var(--rosa); margin:15px 0; display:none; }
#video { width:100%; height:100%; object-fit:cover; }
.scan-line { position:absolute; top:0; width:100%; height:2px; background:var(--cyan); box-shadow:0 0 10px var(--cyan); animation: scan 2s linear infinite; }
@keyframes scan { from { top:0%; } to { top:100%; } }
</style>
</head>
<body>

<div class="topbar">
    <h1>ALPHA</h1>
    <p style="font-size:9px; color:var(--muted); margin-top:-5px;">GESTIÓN ACADÉMICA</p>
</div>

<div id="p-citas" class="page on">
    <h2 style="font-family:'Bebas Neue'; margin-bottom:15px; color:var(--rosa);">Citas Agendadas</h2>
    <div id="cont-citas">Cargando datos desde la nube...</div>
</div>

<div id="p-pagos" class="page">
    <h2 style="font-family:'Bebas Neue'; margin-bottom:15px; color:var(--rosa);">Registrar Pago</h2>
    <div class="card">
        <label style="font-size:12px; color:var(--muted);">Seleccionar Disciplina</label>
        <select id="sel-pago" onchange="checkLibre()">
            <option value="450">Disciplina General ($450)</option>
            <option value="400">Ritmos Latinos ($400)</option>
            <option value="custom">Taller / Actividad Especial</option>
        </select>

        <div id="wrap-custom" style="display:none;">
            <input type="text" id="custom-nom" placeholder="Nombre del Taller">
            <input type="number" id="custom-val" placeholder="Monto a cobrar $">
        </div>

        <button class="btn" onclick="guardarPago()">Confirmar Registro</button>
    </div>
</div>

<div id="p-scan" class="page">
    <h2 style="font-family:'Bebas Neue'; text-align:center; color:var(--cyan);">Lector QR de Visitas</h2>
    <div id="cam-wrap">
        <video id="video" playsinline></video>
        <div class="scan-line"></div>
    </div>
    <button class="btn" onclick="iniciarCamara()">Abrir Cámara</button>
    <p id="info-scan" style="text-align:center; margin-top:15px; font-size:12px; color:var(--muted);"></p>
</div>

<nav class="bot-nav">
    <button class="bn on" onclick="irA('p-citas', this)">CITAS</button>
    <button class="bn" onclick="irA('p-pagos', this)">PAGOS</button>
    <button class="bn" onclick="irA('p-scan', this)">ESCÁNER</button>
</nav>

<script>
// --- CONFIGURACIÓN DE TU BASE DE DATOS ---
const FB_URL = "https://alpha-64b34-default-rtdb.firebaseio.com/.json";
let DB = { citas: [], alumnos: [], pagos: [] };
let video = document.getElementById("video");
let scOn = false;

// --- NAVEGACIÓN ---
function irA(pid, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
    document.getElementById(pid).classList.add('on');
    btn.classList.add('on');
    stopCam();
    if(pid === 'p-citas') fetchCloud();
}

// --- PAGOS Y COSTOS ---
function checkLibre() {
    const val = document.getElementById('sel-pago').value;
    document.getElementById('wrap-custom').style.display = (val === 'custom') ? 'block' : 'none';
}

function guardarPago() {
    const v = document.getElementById('sel-pago').value;
    let nom = "Mensualidad", cost = v;
    if(v === 'custom') {
        nom = document.getElementById('custom-nom').value || "Taller";
        cost = document.getElementById('custom-val').value || "0";
    } else if(v === '400') nom = "Ritmos Latinos";
    
    alert("Registrado correctamente: " + nom + " ($" + cost + ")");
}

// --- CÁMARA QR (SOLUCIÓN DEFINITIVA) ---
async function iniciarCamara() {
    document.getElementById('cam-wrap').style.display = 'block';
    document.getElementById('info-scan').innerText = "Escaneando...";
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } 
        });
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        await video.play();
        scOn = true;
        requestAnimationFrame(tick);
    } catch (e) {
        alert("Error: Asegúrate de estar en HTTPS y dar permisos a la cámara.");
    }
}

function stopCam() {
    scOn = false;
    if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
    document.getElementById('cam-wrap').style.display = 'none';
}

function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA && scOn) {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const code = jsQR(ctx.getImageData(0,0,canvas.width,canvas.height).data, canvas.width, canvas.height);
        if (code) {
            alert("QR Detectado: " + code.data);
            stopCam();
            return;
        }
    }
    if (scOn) requestAnimationFrame(tick);
}

// --- SINCRONIZACIÓN FIREBASE ---
async function fetchCloud() {
    try {
        const res = await fetch(FB_URL);
        const data = await res.json();
        if(data) { DB = data; renderCitas(); }
    } catch (e) { document.getElementById('cont-citas').innerText = "Error de conexión"; }
}

async function borrarCitaCloud(id) {
    if(!confirm("¿Eliminar cita en todos los dispositivos?")) return;
    DB.citas = DB.citas.filter(c => c.id !== id);
    try {
        await fetch(FB_URL, { method: 'PUT', body: JSON.stringify(DB) });
        renderCitas();
    } catch (e) { alert("Error al sincronizar"); }
}

function renderCitas() {
    const c = document.getElementById('cont-citas');
    if(!DB.citas || DB.citas.length === 0) { c.innerHTML = "<p>No hay citas agendadas.</p>"; return; }
    c.innerHTML = "";
    DB.citas.forEach(cita => {
        c.innerHTML += `
            <div class="card">
                <strong>${cita.nombre}</strong><br>
                <small style="color:var(--muted)">${cita.fecha} — ${cita.hora}</small>
                <button class="btn-del" onclick="borrarCitaCloud('${cita.id}')">Eliminar de la nube</button>
            </div>`;
    });
}

// Carga Inicial
fetchCloud();
</script>
</body>
</html>
