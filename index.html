<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 { text-align: center; }

.section {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

li {
  background: #eee;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>Control de Visitas</h1>

<div class="section">
<h2>📷 Escanear QR</h2>
<button onclick="iniciarQR()">Activar cámara</button>
<div id="reader"></div>
<p id="resultadoQR"></p>
</div>

<div class="section">
<h2>➕ Agregar Visita</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar</button>
</div>

<div class="section">
<h2>🔍 Buscar</h2>
<input type="text" id="busqueda" placeholder="Buscar..." onkeyup="filtrar()">
</div>

<div class="section">
<h2>📊 Estadísticas</h2>
<p>Total visitas: <span id="total"></span></p>
</div>

<div class="section">
<h2>📋 Lista de Visitas</h2>
<ul id="lista"></ul>
</div>

<script>

// ===== FOLIO
function generarFolio() {
  return "VIS-" + Date.now();
}

// ===== QR
function iniciarQR() {
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (msg) => {
      document.getElementById("resultadoQR").innerText = msg;
      guardar(msg);
    }
  );
}

// ===== GUARDAR
function guardar(nombre) {
  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.push({
    id: Date.now(),
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  });

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrar();
}

// ===== MANUAL
function agregarVisita() {
  const nombre = document.getElementById("nombreVisita").value;
  if (!nombre) return alert("Ingresa nombre");
  guardar(nombre);
}

// ===== MOSTRAR
function mostrar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  document.getElementById("total").innerText = visitas.length;

  visitas.forEach(v => {
    const li = document.createElement("li");
    li.innerHTML = `
      ${v.folio} - ${v.nombre} (${v.fecha})
      <button onclick="eliminar(${v.id})">Eliminar</button>
    `;
    lista.appendChild(li);
  });
}

// ===== ELIMINAR
function eliminar(id) {
  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];
  visitas = visitas.filter(v => v.id !== id);
  localStorage.setItem("visitas", JSON.stringify(visitas);
  mostrar();
}

// ===== FILTRO
function filtrar() {
  const texto = document.getElementById("busqueda").value.toLowerCase();
  const items = document.querySelectorAll("li");

  items.forEach(li => {
    li.style.display = li.innerText.toLowerCase().includes(texto) ? "" : "none";
  });
}

mostrar();

</script>

</body>
</html>
