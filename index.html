<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>App de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

h2 { margin-top: 30px; }

video {
  width: 100%;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Control de Visitas</h1>

<h2>📷 Escanear QR</h2>
<div id="reader"></div>
<p id="resultadoQR"></p>

<h2>➕ Agregar Visita Manual</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar</button>

<h2>📋 Lista de Visitas</h2>
<ul id="listaVisitas"></ul>

<script>
// =======================
// QR SCANNER MEJORADO
// =======================
const resultadoQR = document.getElementById("resultadoQR");

function iniciarQR() {
  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {

      html5QrCode.start(
        { facingMode: "environment" }, // cámara trasera
        {
          fps: 10,
          qrbox: 250
        },
        qrCodeMessage => {
          resultadoQR.innerText = "QR detectado: " + qrCodeMessage;
        },
        errorMessage => {
          // silencioso
        }
      ).catch(err => {
        resultadoQR.innerText = "Error iniciando cámara: " + err;
      });

    } else {
      resultadoQR.innerText = "No se encontró cámara";
    }
  }).catch(err => {
    resultadoQR.innerText = "Error permisos cámara: " + err;
  });
}

// IMPORTANTE: iniciar después de cargar
window.onload = iniciarQR;


// =======================
// VISITAS
// =======================

function generarFolio() {
  return 'VIS-' + Date.now();
}

function agregarVisita() {
  const nombre = document.getElementById("nombreVisita").value.trim();

  if (!nombre) {
    alert("Ingresa un nombre");
    return;
  }

  const folio = generarFolio();

  const visita = {
    folio,
    nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem('visitas')) || [];
  visitas.push(visita);
  localStorage.setItem('visitas', JSON.stringify(visitas));

  document.getElementById("nombreVisita").value = "";

  mostrarVisitas();
}

// =======================
// MOSTRAR VISITAS
// =======================

function mostrarVisitas() {
  const lista = document.getElementById("listaVisitas");
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem('visitas')) || [];

  visitas.forEach(v => {
    const li = document.createElement("li");
    li.textContent = `${v.folio} - ${v.nombre} (${v.fecha})`;
    lista.appendChild(li);
  });
}

mostrarVisitas();
</script>

</body>
</html>
