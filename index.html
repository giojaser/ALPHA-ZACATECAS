<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  padding: 20px;
}

h1 { text-align: center; }

.container {
  background: #1e1e1e;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

button {
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  background: #00c853;
  color: white;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}

li {
  margin: 5px 0;
  background: #2a2a2a;
  padding: 8px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>🚀 Control de Visitas PRO</h1>

<div class="container">
  <h2>📷 Escanear QR</h2>
  <div id="reader"></div>
  <p id="qrResultado"></p>
</div>

<div class="container">
  <h2>➕ Registro Manual</h2>
  <input type="text" id="nombre" placeholder="Nombre visitante">
  <button onclick="registrarManual()">Registrar</button>
</div>

<div class="container">
  <h2>📋 Visitas en Tiempo Real</h2>
  <ul id="lista"></ul>
</div>

<script>
// =======================
// 🔥 CONFIGURA FIREBASE AQUÍ
// =======================
const firebaseConfig = {
  apiKey: "AQUI",
  authDomain: "AQUI",
  projectId: "AQUI",
  storageBucket: "AQUI",
  messagingSenderId: "AQUI",
  appId: "AQUI"
};

// Inicializar Firebase
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =======================
// 🎯 GENERAR FOLIO
// =======================
function generarFolio() {
  return "VIS-" + Date.now();
}

// =======================
// 📷 QR
// =======================
const qrResultado = document.getElementById("qrResultado");

function iniciarQR() {
  const qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices.length) {
      qr.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        async (qrCodeMessage) => {

          qrResultado.innerText = "QR: " + qrCodeMessage;

          const visita = {
            folio: generarFolio(),
            nombre: qrCodeMessage,
            fecha: new Date().toLocaleString()
          };

          await db.collection("visitas").add(visita);

        }
      );
    }
  }).catch(err => {
    qrResultado.innerText = "Error cámara: " + err;
  });
}

window.onload = iniciarQR;

// =======================
// ➕ REGISTRO MANUAL
// =======================
async function registrarManual() {
  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) {
    alert("Ingresa nombre");
    return;
  }

  const visita = {
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  };

  await db.collection("visitas").add(visita);

  document.getElementById("nombre").value = "";
}

// =======================
// 📋 TIEMPO REAL
// =======================
const lista = document.getElementById("lista");

db.collection("visitas").orderBy("fecha", "desc")
.onSnapshot(snapshot => {
  lista.innerHTML = "";

  snapshot.forEach(doc => {
    const v = doc.data();

    const li = document.createElement("li");
    li.textContent = `${v.folio} - ${v.nombre} (${v.fecha})`;

    lista.appendChild(li);
  });
});
</script>

</body>
</html>
