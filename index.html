<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}

h1 {
  text-align: center;
}

video {
  width: 100%;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 100%;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: white;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
}
</style>
</head>

<body>

<h1>Control de Visitas</h1>

<h2>📷 Escanear QR</h2>
<button onclick="iniciarQR()">Activar cámara</button>
<div id="reader"></div>
<p id="resultadoQR"></p>

<h2>➕ Agregar Visita Manual</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar</button>

<h2>📋 Lista de Visitas</h2>
<ul id="listaVisitas"></ul>

<h2>🔐 Panel Admin</h2>
<input type="password" id="adminPass" placeholder="Contraseña">
<button onclick="activarAdmin()">Entrar</button>
<div id="adminOpciones" style="display:none;">
  <button onclick="exportar()">Exportar</button>
  <button onclick="limpiar()">Limpiar todo</button>
</div>

<script>

// =======================
// FOLIO
// =======================
function generarFolio() {
  return 'VIS-' + Date.now();
}

// =======================
// QR (ARREGLADO)
// =======================
let qr;

function iniciarQR() {

  qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (mensaje) => {

      document.getElementById("resultadoQR").innerText =
        "QR detectado: " + mensaje;

      guardarVisita(mensaje);
    }
  ).catch(() => {
    alert("Usa celular o habilita cámara");
  });
}

// =======================
// GUARDAR VISITA
// =======================
function guardarVisita(nombre) {

  const visita = {
    id: Date.now(),
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.push(visita);

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrar();
}

// =======================
// MANUAL
// =======================
function agregarVisita() {

  const nombre = document.getElementById("nombreVisita").value.trim();

  if (!nombre) {
    alert("Ingresa un nombre");
    return;
  }

  guardarVisita(nombre);

  document.getElementById("nombreVisita").value = "";
}

// =======================
// MOSTRAR (COMO ORIGINAL)
// =======================
function mostrar() {

  const lista = document.getElementById("listaVisitas");
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.forEach(v => {

    const li = document.createElement("li");
    li.textContent = `${v.folio} - ${v.nombre} (${v.fecha})`;

    lista.appendChild(li);
  });
}

// =======================
// ADMIN
// =======================
function activarAdmin() {
  if (document.getElementById("adminPass").value === "admin123") {
    document.getElementById("adminOpciones").style.display = "block";
  } else {
    alert("Incorrecto");
  }
}

function limpiar() {
  if (confirm("Eliminar todo?")) {
    localStorage.removeItem("visitas");
    mostrar();
  }
}

function exportar() {
  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  let csv = "Folio,Nombre,Fecha\n";

  visitas.forEach(v => {
    csv += `${v.folio},${v.nombre},${v.fecha}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "visitas.csv";
  a.click();
}

// =======================
mostrar();

</script>

</body>
</html>
