<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALPHA Control</title>
<link rel="manifest" href="manifest.json">
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#111;
  color:#fff;
}
header{
  background:#ff4da6;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}
.container{
  padding:20px;
}
.card{
  background:#1e1e1e;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}
input,select,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
}
button{
  background:#ff4da6;
  color:#fff;
  cursor:pointer;
}
button:hover{
  opacity:.9;
}
.table{
  width:100%;
  border-collapse:collapse;
}
.table th,.table td{
  border:1px solid #333;
  padding:10px;
  text-align:left;
}
.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
.activo{
  background:#00b894;
}
.vencido{
  background:#d63031;
}
.btn-row{
  display:flex;
  gap:10px;
}
</style>
</head>
<body>
<header>
ALPHA Control de Alumnos
</header>

<div class="container">

<div class="card">
<h2>Agregar Alumno</h2>
<input id="nombre" placeholder="Nombre">
<input id="apellidos" placeholder="Apellidos">
<input id="telefono" placeholder="Teléfono">
<input id="fechaInscripcion" type="date">
<select id="plan">
<option value="8">8 clases</option>
<option value="12">12 clases</option>
<option value="VIP">VIP ilimitado</option>
</select>
<button onclick="agregarAlumno()">Guardar Alumno</button>
</div>

<div class="card">
<h2>Agregar Visita</h2>
<select id="alumnoVisita"></select>
<input id="ev-fecha" type="date">
<input id="ev-hora" type="time">
<select id="ev-disc">
<option>Baile</option>
<option>Fitness</option>
<option>Heels</option>
</select>
<button onclick="evAgregarVisita()">Guardar Visita</button>
</div>

<div class="card">
<h2>Alumnos</h2>
<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Plan</th>
<th>Estado</th>
<th>Visitas</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaAlumnos"></tbody>
</table>
</div>

</div>

<script>

let DB = {
  alumnos:[],
  visLog:[]
};

let S = {
  writeLock:false
};

function saveLocal(){

  try{

    const payload = {
      DB: DB,
      version: '4.0.0',
      updated: Date.now()
    };

    localStorage.setItem(
      'alpha_v4',
      JSON.stringify(payload)
    );

  }catch(e){

    console.error('saveLocal error:', e);

    alert('Error guardando datos');
  }
}

function loadLocal(){

  try{

    let raw = localStorage.getItem('alpha_v4');

    if(!raw) return;

    let d = JSON.parse(raw);

    DB = d.DB || {
      alumnos:[],
      visLog:[]
    };

  }catch(e){

    console.error(e);

    DB = {
      alumnos:[],
      visLog:[]
    };
  }
}

function generarFolio(){
  return 'AL-' + Math.floor(Math.random()*999999);
}

function calcularFechaExpiracion(fechaInicio){

  let f = new Date(fechaInicio + 'T00:00:00');

  f.setMonth(f.getMonth()+1);

  return f.toISOString().split('T')[0];
}

function agregarAlumno(){

  let nombre = document.getElementById('nombre').value;
  let apellidos = document.getElementById('apellidos').value;
  let telefono = document.getElementById('telefono').value;
  let fechaInscripcion = document.getElementById('fechaInscripcion').value;
  let plan = document.getElementById('plan').value;

  if(!nombre || !fechaInscripcion){
    alert('Completa los campos');
    return;
  }

  let alumno = {
    folio: generarFolio(),
    nombre,
    apellidos,
    telefono,
    fechaInscripcion,
    fechaExpira: calcularFechaExpiracion(fechaInscripcion),
    planActual: plan,
    visitas:[],
    estado:'Activo'
  };

  DB.alumnos.push(alumno);

  saveLocal();

  renderAlumnos();

  limpiarCampos();
}

function limpiarCampos(){
  document.getElementById('nombre').value='';
  document.getElementById('apellidos').value='';
  document.getElementById('telefono').value='';
}

function renderAlumnos(){

  let tbody = document.getElementById('tablaAlumnos');

  tbody.innerHTML='';

  let select = document.getElementById('alumnoVisita');

  select.innerHTML='';

  DB.alumnos.forEach(function(a,index){

    let tr = document.createElement('tr');

    tr.innerHTML=`
      <td>${a.nombre} ${a.apellidos}</td>
      <td>${a.planActual}</td>
      <td>
        <span class="badge ${a.estado==='Activo'?'activo':'vencido'}">
          ${a.estado}
        </span>
      </td>
      <td>${a.visitas.length}</td>
      <td>
        <div class="btn-row">
          <button onclick="editarAlumno(${index})">Editar</button>
          <button onclick="eliminarAlumno(${index})">Eliminar</button>
        </div>
      </td>
    `;

    tbody.appendChild(tr);

    let op = document.createElement('option');
    op.value=index;
    op.textContent=a.nombre+' '+a.apellidos;
    select.appendChild(op);

  });
}

async function evAgregarVisita(){

  if(S.writeLock){
    alert('Guardando información...');
    return;
  }

  let alumnoIndex = document.getElementById('alumnoVisita').value;

  let a = DB.alumnos[alumnoIndex];

  if(!a){
    alert('Alumno no encontrado');
    return;
  }

  if(a.estado==='Vencido'){
    alert('Mensualidad vencida');
    return;
  }

  let fecha = document.getElementById('ev-fecha').value;
  let hora = document.getElementById('ev-hora').value;
  let disc = document.getElementById('ev-disc').value;

  let existe = DB.visLog.find(v=>
    v.folio===a.folio &&
    v.fecha===fecha &&
    v.hora===hora
  );

  if(existe){
    alert('La visita ya existe');
    return;
  }

  let visita = {
    folio:a.folio,
    fecha,
    hora,
    disc,
    ts:Date.now()
  };

  DB.visLog.push(visita);
  a.visitas.push(visita);

  S.writeLock = true;

  try{

    saveLocal();

    alert('Visita guardada correctamente');

    renderAlumnos();

  }catch(e){

    console.error(e);

    alert('Error guardando');

  }finally{

    setTimeout(()=>{
      S.writeLock=false;
    },1000);
  }
}

function actualizarMensualidades(){

  let hoy = new Date();

  DB.alumnos.forEach(function(a){

    let fechaExp = new Date(a.fechaExpira+'T23:59:59');

    if(hoy > fechaExp){
      a.estado='Vencido';
    }else{
      a.estado='Activo';
    }
  });

  saveLocal();
}

function editarAlumno(index){

  let a = DB.alumnos[index];

  let nuevoNombre = prompt('Editar nombre',a.nombre);

  if(nuevoNombre===null) return;

  a.nombre = nuevoNombre;

  saveLocal();

  renderAlumnos();

  alert('Cambios guardados');
}

function eliminarAlumno(index){

  if(!confirm('¿Eliminar alumno?')) return;

  DB.alumnos.splice(index,1);

  saveLocal();

  renderAlumnos();
}

loadLocal();
actualizarMensualidades();
renderAlumnos();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
