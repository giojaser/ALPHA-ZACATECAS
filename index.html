<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 20px;
}

button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #00e676;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00c853;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

#reader {
  margin-top: 10px;
}

li {
  background: rgba(0,0,0,0.3);
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🚀 Control de Visitas</h1>

<div class="card">
  <h2>📷 Escanear QR</h2>
  <button onclick="iniciarQR()">Activar Cámara</button>
  <div id="reader"></div>
  <p id="qrResultado"></p>
</div>

<div class="card">
  <h2>➕ Registro Manual</h2>
  <input type="text" id="nombre" placeholder="Nombre visitante">
  <button onclick="registrar()">Registrar</button>
</div>

<div class="card">
  <h2>📋 Visitas</h2>
  <ul id="lista"></ul>
</div>

<script>
// =================
// VARIABLES
// =================
const lista = document.getElementById("lista");
const qrResultado = document.getElementById("qrResultado");

// =================
// FOLIO
// =================
function generarFolio() {
  return "VIS-" + Date.now();
}

// =================
// QR SEGURO
// =================
function iniciarQR() {
  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (qrCodeMessage) => {

      qrResultado.innerText = "QR detectado: " + qrCodeMessage;

      guardarVisita(qrCodeMessage);

    },
    (error) => {}
  ).catch(err => {
    qrResultado.innerText = "⚠️ Usa celular o habilita cámara";
  });
}

// =================
// GUARDAR VISITA
// =================
function guardarVisita(nombre) {
  const visita = {
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];
  visitas.push(visita);
  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrar();
}

// =================
// REGISTRO MANUAL
// =================
function registrar() {
  const nombre = document.getElementById("nombre").value.trim();

  if (!nombre) {
    alert("Ingresa nombre");
    return;
  }

  guardarVisita(nombre);
  document.getElementById("nombre").value = "";
}

// =================
// MOSTRAR
// =================
function mostrar() {
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.reverse().forEach(v => {
    const li = document.createElement("li");
    li.textContent = `${v.folio} - ${v.nombre} (${v.fecha})`;
    lista.appendChild(li);
  });
}

mostrar();
</script>

</body>
</html>
