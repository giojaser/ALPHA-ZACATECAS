<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Alpha — Centro de Desarrollo Artístico y Cultural</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<style>
/* Estilos base (Manteniendo tu diseño original) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#252525;
  --rosa:#d4537e;--rosa2:#e8729a;--rosa-d:#8c2f50;--rosa-xl:rgba(212,83,126,.12);
  --cyan:#00d4ff;--blanco:#f0ece4;--muted:#777;
  --border:rgba(255,255,255,0.08);
}
body{background:var(--bg);color:var(--blanco);font-family:'Outfit',sans-serif;overflow-x:hidden;}

/* Ajustes específicos para el contenedor de la cámara */
#cam-container {
    width: 100%;
    max-width: 500px;
    margin: 20px auto;
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    background: #000;
    border: 2px solid var(--rosa);
}
#cam-preview {
    width: 100%;
    display: block;
}
#cam-canvas {
    display: none;
}
.scan-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    border: 2px solid rgba(212,83,126,0.5);
    box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    pointer-events: none;
}
.btn-scan {
    background: var(--rosa);
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
}
</style>
</head>
<body>

<div id="p-scan" class="page">
    <div class="content">
        <h2 style="font-family:'Bebas Neue'; font-size: 2.5rem; color: var(--rosa);">Registrar Visita</h2>
        <p style="color: var(--muted); margin-bottom: 20px;">Escanea el código QR del alumno para registrar su asistencia.</p>
        
        <div id="cam-container">
            <video id="cam-preview" playsinline></video>
            <canvas id="cam-canvas"></canvas>
            <div class="scan-overlay"></div>
        </div>

        <button class="btn-scan" onclick="startScanner()">Activar Cámara</button>
        <button class="btn-scan" style="background: var(--bg3);" onclick="stopScanner()">Cancelar</button>
    </div>
</div>

<script>
let video = document.getElementById("cam-preview");
let canvasElement = document.getElementById("cam-canvas");
let canvas = canvasElement.getContext("2d", { willReadFrequently: true });
let scanning = false;

async function startScanner() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } 
        });
        
        video.srcObject = stream;
        video.setAttribute("playsinline", true); // Crucial para iOS
        video.play();
        scanning = true;
        requestAnimationFrame(tick);
    } catch (err) {
        console.error("Error al acceder a la cámara: ", err);
        alert("No se pudo acceder a la cámara. Asegúrate de estar usando HTTPS y de dar permisos.");
    }
}

function stopScanner() {
    scanning = false;
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
}

function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
        canvasElement.height = video.videoHeight;
        canvasElement.width = video.videoWidth;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        
        var imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        var code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: "dontInvert",
        });

        if (code) {
            console.log("QR Detectado:", code.data);
            handleScannedData(code.data);
            stopScanner();
            return; // Detener el ciclo si se encuentra un código
        }
    }
    if (scanning) {
        requestAnimationFrame(tick);
    }
}

function handleScannedData(data) {
    // Aquí integras con tu lógica de Firebase o Base de Datos
    alert("Asistencia registrada para: " + data);
    // Ejemplo: registrarVisita(data);
}

// Lógica de navegación y carga de DB de tu archivo original...
// (Mantén aquí el resto de tus funciones de Firebase y renderizado)
</script>

</body>
</html>
