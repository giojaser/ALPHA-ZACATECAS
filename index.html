<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia - Control PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body{font-family:sans-serif;background:#0a0a0a;color:#fff;padding:20px}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{background:#d4537e;color:#fff;cursor:pointer}
.card{background:#1e1e1e;padding:15px;margin:10px 0;border-radius:10px}
</style>
</head>

<body>

<h2>🎓 Academia - Control de Alumnos</h2>

<!-- CREAR ALUMNO -->
<div class="card">
<h3>Nuevo Alumno</h3>
<input id="nombre" placeholder="Nombre">
<input id="disciplina" placeholder="Disciplina">
<button onclick="crearAlumno()">Registrar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<!-- QR -->
<div class="card">
<h3>Escanear QR</h3>
<div id="reader"></div>
</div>

<script>

/******** CONFIG ********/
const CONFIG = {
  clases: 8,
  dias: 30
};

let alumnos = JSON.parse(localStorage.getItem("alumnos")) || [];

/******** STORAGE ********/
function guardar(){
  localStorage.setItem("alumnos", JSON.stringify(alumnos));
}

/******** CREAR MEMBRESIA ********/
function nuevaMembresia(){
  let hoy = new Date();
  let venc = new Date();
  venc.setDate(hoy.getDate() + CONFIG.dias);

  return {
    total: CONFIG.clases,
    usadas: 0,
    inicio: hoy.toISOString(),
    vencimiento: venc.toISOString(),
    estado: "activo"
  };
}

/******** ESTADO ********/
function estado(a){
  let hoy = new Date();
  let v = new Date(a.m.vencimiento);

  if(hoy > v) a.m.estado = "vencido";
  else if(a.m.usadas >= a.m.total) a.m.estado = "sin_clases";
  else a.m.estado = "activo";
}

/******** CREAR ********/
function crearAlumno(){
  let n = document.getElementById("nombre").value;
  let d = document.getElementById("disciplina").value;

  if(!n) return alert("Nombre requerido");

  alumnos.push({
    id: Date.now().toString(),
    nombre: n,
    disciplina: d,
    m: nuevaMembresia()
  });

  guardar();
  render();
}

/******** ASISTENCIA ********/
function asistir(id){
  let a = alumnos.find(x=>x.id==id);

  estado(a);

  if(a.m.estado !== "activo"){
    alert("Debe pagar");
    return;
  }

  a.m.usadas++;
  estado(a);

  guardar();
  render();
}

/******** PAGAR ********/
function pagar(id){
  let a = alumnos.find(x=>x.id==id);
  a.m = nuevaMembresia();
  guardar();
  render();
}

/******** RENDER ********/
function render(){
  let html = "";

  alumnos.forEach(a=>{
    estado(a);
    let rest = a.m.total - a.m.usadas;

    html += `
    <div class="card">
      <b>${a.nombre}</b> (${a.disciplina})<br>
      Estado: ${a.m.estado}<br>
      Usadas: ${a.m.usadas} / ${a.m.total}<br>
      No usadas: ${rest}<br>
      Vence: ${new Date(a.m.vencimiento).toLocaleDateString()}<br><br>

      <button onclick="asistir('${a.id}')">Registrar asistencia</button>
      <button onclick="pagar('${a.id}')">Renovar</button>

      <div id="qr-${a.id}"></div>
    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;

  alumnos.forEach(a=>{
    new QRCode(document.getElementById("qr-"+a.id), a.id);
  });
}

/******** QR SCANNER ********/
const qr = new Html5Qrcode("reader");

qr.start(
  { facingMode: "environment" },
  { fps: 10 },
  (decodedText)=>{
    let a = alumnos.find(x=>x.id==decodedText);
    if(a) asistir(a.id);
  }
);

/******** INIT ********/
render();

</script>

</body>
</html>
