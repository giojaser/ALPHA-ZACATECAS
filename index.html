<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #eef1f5;
}

header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-top: 0;
  font-size: 18px;
}

button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #007bff;
  color: white;
  font-size: 14px;
  margin-top: 10px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#reader {
  margin-top: 10px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #f9f9f9;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  font-size: 14px;
}

.admin-box {
  background: #2c2c2c;
  color: white;
  padding: 10px;
  border-radius: 10px;
}

small {
  color: gray;
}
</style>
</head>

<body>

<header>
🚀 Control de Visitas
</header>

<div class="container">

<div class="card">
<h2>📷 Escanear QR</h2>
<button onclick="iniciarQR()">Activar cámara</button>
<div id="reader"></div>
<p id="resultadoQR"><small>Escanea un código QR</small></p>
</div>

<div class="card">
<h2>➕ Registro Manual</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar visita</button>
</div>

<div class="card">
<h2>📋 Lista de Visitas</h2>
<ul id="listaVisitas"></ul>
</div>

<div class="card admin-box">
<h2>🔐 Administrador</h2>
<input type="password" id="adminPass" placeholder="Contraseña">
<button onclick="activarAdmin()">Entrar</button>

<div id="adminOpciones" style="display:none;">
  <button onclick="exportar()">📤 Exportar CSV</button>
  <button onclick="limpiar()">🗑️ Limpiar registros</button>
</div>
</div>

</div>

<script>
// =======================
// FOLIO
// =======================
function generarFolio() {
  return 'VIS-' + Date.now();
}

// =======================
// QR
// =======================
let qrActivo = false;

function iniciarQR() {

  if (qrActivo) return;

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (mensaje) => {

      document.getElementById("resultadoQR").innerText =
        "QR detectado: " + mensaje;

      guardarVisita(mensaje);
    }
  ).then(() => {
    qrActivo = true;
  })
  .catch(() => {
    alert("⚠️ Usa celular o activa permisos de cámara");
  });
}

// =======================
// GUARDAR
// =======================
function guardarVisita(nombre) {

  const visita = {
    id: Date.now(),
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.push(visita);

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrar();
}

// =======================
// MANUAL
// =======================
function agregarVisita() {

  const nombre = document.getElementById("nombreVisita").value.trim();

  if (!nombre) {
    alert("Ingresa un nombre");
    return;
  }

  guardarVisita(nombre);

  document.getElementById("nombreVisita").value = "";
}

// =======================
// MOSTRAR
// =======================
function mostrar() {

  const lista = document.getElementById("listaVisitas");
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.slice().reverse().forEach(v => {

    const li = document.createElement("li");
    li.innerHTML = `
      <strong>${v.folio}</strong><br>
      ${v.nombre}<br>
      <small>${v.fecha}</small>
    `;

    lista.appendChild(li);
  });
}

// =======================
// ADMIN
// =======================
function activarAdmin() {

  if (document.getElementById("adminPass").value === "admin123") {
    document.getElementById("adminOpciones").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}

function limpiar() {
  if (confirm("¿Eliminar todos los registros?")) {
    localStorage.removeItem("visitas");
    mostrar();
  }
}

function exportar() {

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  let csv = "Folio,Nombre,Fecha\n";

  visitas.forEach(v => {
    csv += `${v.folio},${v.nombre},${v.fecha}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "visitas.csv";
  a.click();
}

// =======================
mostrar();
</script>

</body>
</html>
