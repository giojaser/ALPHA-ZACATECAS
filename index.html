<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Visitas PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
}

.container { padding: 15px; }

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
  background: #007bff;
  color: white;
  margin-top: 10px;
  cursor: pointer;
}

button:hover { background: #0056b3; }

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

li {
  background: #eee;
  padding: 8px;
  margin-top: 5px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
}

.admin {
  background: #212121;
  color: white;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
<h1>Control de Visitas</h1>
</header>

<div class="container">

<div class="card">
<h2>📷 Escanear QR</h2>
<button onclick="iniciarQR()">Activar cámara</button>
<div id="reader"></div>
<p id="resultadoQR"></p>
</div>

<div class="card">
<h2>➕ Agregar Visita Manual</h2>
<input type="text" id="nombreVisita" placeholder="Nombre visitante">
<button onclick="agregarVisita()">Agregar</button>
</div>

<div class="card">
<h2>📋 Lista de Visitas</h2>
<ul id="listaVisitas"></ul>
</div>

<div class="card admin">
<h2>🔐 Panel Administrador</h2>
<input type="password" id="adminPass" placeholder="Contraseña">
<button onclick="abrirAdmin()">Entrar</button>

<div id="adminPanel" style="display:none;">
  <button onclick="exportarExcel()">📤 Exportar Excel</button>
  <button onclick="limpiarTodo()">🗑️ Limpiar Todo</button>
</div>
</div>

</div>

<script>
// =======================
// FOLIO
// =======================
function generarFolio() {
  return 'VIS-' + Date.now();
}

// =======================
// QR
// =======================
let qrActivo = false;

function iniciarQR() {

  if (qrActivo) return;

  const qr = new Html5Qrcode("reader");

  qr.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (qrCodeMessage) => {

      document.getElementById("resultadoQR").innerText =
        "QR detectado: " + qrCodeMessage;

      guardarVisita(qrCodeMessage);
    }
  ).then(() => {
    qrActivo = true;
  })
  .catch(() => {
    document.getElementById("resultadoQR").innerText =
      "⚠️ Usa celular o habilita cámara";
  });
}

// =======================
// GUARDAR
// =======================
function guardarVisita(nombre) {

  const visita = {
    id: Date.now(),
    folio: generarFolio(),
    nombre,
    fecha: new Date().toLocaleString()
  };

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];
  visitas.push(visita);

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrarVisitas();
}

// =======================
// MANUAL
// =======================
function agregarVisita() {

  const nombre = document.getElementById("nombreVisita").value.trim();

  if (!nombre) {
    alert("Ingresa un nombre");
    return;
  }

  guardarVisita(nombre);

  document.getElementById("nombreVisita").value = "";
}

// =======================
// MOSTRAR
// =======================
function mostrarVisitas() {

  const lista = document.getElementById("listaVisitas");
  lista.innerHTML = "";

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas.slice().reverse().forEach(v => {

    const li = document.createElement("li");

    li.innerHTML = `
      <span>${v.folio} - ${v.nombre} (${v.fecha})</span>
      <button onclick="eliminar(${v.id})" style="background:red;width:auto;">X</button>
    `;

    lista.appendChild(li);
  });
}

// =======================
// ELIMINAR
// =======================
function eliminar(id) {

  let visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  visitas = visitas.filter(v => v.id !== id);

  localStorage.setItem("visitas", JSON.stringify(visitas));

  mostrarVisitas();
}

// =======================
// ADMIN
// =======================
function abrirAdmin() {

  const pass = document.getElementById("adminPass").value;

  if (pass === "admin123") {
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Contraseña incorrecta");
  }
}

// =======================
// LIMPIAR
// =======================
function limpiarTodo() {

  if (confirm("¿Eliminar todo?")) {
    localStorage.removeItem("visitas");
    mostrarVisitas();
  }
}

// =======================
// EXPORTAR
// =======================
function exportarExcel() {

  const visitas = JSON.parse(localStorage.getItem("visitas")) || [];

  let csv = "Folio,Nombre,Fecha\n";

  visitas.forEach(v => {
    csv += `${v.folio},${v.nombre},${v.fecha}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "visitas.csv";
  a.click();
}

// =======================
mostrarVisitas();
</script>

</body>
</html>
